<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nezafilm</title>

<!-- FAVICON -->
<link rel="icon" type="image/png" href="favicon.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#000;color:white;overflow-x:hidden;}

/* HERO */
.hero{
  position:relative;
  height:100vh;
  overflow:hidden;
}
.hero::before{
  content:"";
  position:absolute;
  width:110%;
  height:110%;
  background:url('background.jpg') center/cover no-repeat;
  filter:blur(14px);
  transform:scale(1.1);
}
.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
}
.hero-content{
  position:relative;
  z-index:2;
  text-align:center;
  max-width:600px;
  margin:auto;
  padding-top:80px;
}
.logo{width:240px;margin-bottom:15px;}
.hero p{color:#ccc;margin-bottom:20px;}

/* BUTTON */
.btn{
  padding:16px 40px;
  background:linear-gradient(45deg,#e50914,#ff4d4d);
  border:none;
  border-radius:40px;
  color:white;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 25px rgba(255,0,0,0.6);
}

/* PROGRESS */
.progress-container{
  width:80%;
  max-width:300px;
  height:6px;
  background:#222;
  border-radius:10px;
  margin:15px auto;
  overflow:hidden;
  display:none;
}
.progress-bar{
  height:100%;
  width:0%;
  background:#e50914;
}

/* TELEGRAM FLOAT */
.float-tg{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0088cc;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  color:white;
  text-decoration:none;
}

/* SECTION */
.section{
  padding:60px 20px;
  background:url('bg2.jpg') center/cover no-repeat;
}

/* APP INFO */
.app-info{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}
.app-icon{
  width:100px;
  border-radius:20px;
}
.stars{color:gold;}
.verified{color:#00ff99;font-size:13px;}

/* MAIN 3 SCREENS */
.screens{
  display:flex;
  gap:15px;
  justify-content:center;
  margin-top:25px;
  flex-wrap:wrap;
}
.screens img{
  width:230px;
  border-radius:20px;
  transition:0.3s;
}
.screens img:hover{transform:scale(1.05);}

/* EXTRA CAROUSEL (screen4-10) */
.carousel{
  margin-top:30px;
  display:flex;
  gap:15px;
  overflow-x:auto;
  padding:10px;
}
.carousel img{
  height:400px;
  border-radius:20px;
  transition:0.3s;
}
.carousel img:hover{transform:scale(1.08);}

/* REVIEWS */
.reviews{
  margin-top:40px;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
}
.review{
  background:#111;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

/* POPUP */
.popup{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#111;
  padding:10px 15px;
  border-radius:10px;
  display:none;
}

@media(max-width:600px){
.logo{width:180px;}
.screens img{width:140px;}
.carousel img{height:260px;}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<div class="hero-content">

<img src="logo.png" class="logo">

<p>Unlimited streaming. Anytime. Anywhere.</p>

<a href="https://raw.githubusercontent.com/Nezafilm/Nezafilm.github.io/main/nezafilm.apk" onclick="startDownload()">
<button class="btn">Download APK</button>
</a>

<div class="progress-container" id="progressBox">
<div class="progress-bar" id="progressBar"></div>
</div>

</div>
</section>

<!-- SECTION -->
<section class="section">

<div class="app-info">
<img src="icon.png" class="app-icon">

<div>
<h2>Nezafilm</h2>
<div class="stars">★★★★★</div>
<div class="verified">✔ Verified App</div>
</div>
</div>

<!-- MAIN 3 SCREENS -->
<div class="screens">
<img src="screen1.jpg">
<img src="screen2.jpg">
<img src="screen3.jpg">
</div>

<!-- EXTRA 7 SCREENS -->
<div class="carousel">
<img src="screen4.jpg">
<img src="screen5.jpg">
<img src="screen6.jpg">
<img src="screen7.jpg">
<img src="screen8.jpg">
<img src="screen9.jpg">
<img src="screen10.jpg">
</div>

<!-- REVIEWS -->
<div class="reviews">
<div class="review">Alex ⭐⭐⭐⭐⭐ - Amazing app!</div>
<div class="review">Maria ⭐⭐⭐⭐⭐ - Super smooth!</div>
<div class="review">James ⭐⭐⭐⭐☆ - Great overall</div>
</div>

</section>

<!-- FLOAT TELEGRAM -->
<a href="https://t.me/nezafilm_community" class="float-tg">💬</a>

<!-- POPUP -->
<div class="popup" id="popup">
Enable unknown sources to install
</div>

<script>
function startDownload(){
document.getElementById("popup").style.display="block";

let bar=document.getElementById("progressBar");
let box=document.getElementById("progressBox");
box.style.display="block";

let width=0;
let interval=setInterval(()=>{
if(width>=100){
clearInterval(interval);
}else{
width+=5;
bar.style.width=width+"%";
}
},150);
}
</script>

</body>
</html>
