<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nezafilm</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body {background:#000;color:white;}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.hero::before {
  content: "";
  position: absolute;
  width: 110%;
  height: 110%;
  background: url('background.jpg') center/cover no-repeat;
  filter: blur(10px);
  transform: scale(1.1);
  z-index: 0;
}

.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 1;
}

.hero-content {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 600px;
  margin: auto;
}

.logo {
  width: 260px;
  margin-bottom: 20px;
}

.hero p {
  margin-bottom: 25px;
  color: #ccc;
  font-size: 18px;
}

/* DOWNLOAD BUTTON */
.btn {
  padding: 16px 40px;
  background: linear-gradient(45deg,#e50914,#ff4d4d);
  border: none;
  border-radius: 40px;
  color: white;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(255,0,0,0.6);
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* BADGES */
.badges {
  margin-top: 20px;
  color: #aaa;
}

/* TELEGRAM */
.social {
  margin-top: 30px;
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}

.tg-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  border-radius: 40px;
  background: linear-gradient(135deg, #0088cc, #00aced);
  color: white;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.3s ease;
  box-shadow: 0 0 15px rgba(0,136,204,0.5);
}

.tg-btn:hover {
  transform: translateY(-2px) scale(1.05);
  box-shadow: 0 0 25px rgba(0,136,204,0.9);
}

.tg-btn.outline {
  background: transparent;
  border: 2px solid #0088cc;
  box-shadow: none;
}

.tg-btn.outline:hover {
  background: #0088cc;
}

/* SCREENSHOTS */
.section {
  padding: 60px 20px;
  text-align: center;
  background: url('bg2.jpg') center/cover no-repeat;
}

.section h2 {
  margin-bottom: 30px;
}

.screens {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.screens img {
  width: 250px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  transition: 0.3s;
}

.screens img:hover {
  transform: scale(1.05);
}

/* POPUP */
.popup {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #111;
  padding: 15px 20px;
  border-radius: 10px;
  display: none;
}

/* MOBILE */
@media(max-width:600px){
  .logo {width:180px;}
  .screens img {width:140px;}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">

    <img src="logo.png" class="logo">

    <p>Unlimited streaming. Anytime. Anywhere.</p>

    <a href="https://raw.githubusercontent.com/Nezafilm/Nezafilm.github.io/main/nezafilm.apk" onclick="showPopup()">
      <button class="btn">Download APK</button>
    </a>

    <div class="badges">✔ Safe • ✔ Fast • ✔ No Ads</div>

    <div class="social">
      <a href="https://t.me/nezafilm_updates" target="_blank" class="tg-btn">
        📢 Channel
      </a>

      <a href="https://t.me/nezafilm_community" target="_blank" class="tg-btn outline">
        💬 Community
      </a>
    </div>

  </div>
</section>

<!-- SCREENSHOTS -->
<section class="section">
  <h2>App Preview</h2>
  <div class="screens">
    <img src="screen1.jpg">
    <img src="screen2.jpg">
    <img src="screen3.jpg">
  </div>
</section>

<!-- POPUP -->
<div class="popup" id="popup">
  After download: Enable "Install Unknown Apps" in your settings.
</div>

<script>
function showPopup(){
  document.getElementById("popup").style.display = "block";
}
</script>

</body>
</html>
